<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Puppy Bone Dash Launcher</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      font-family: "Yu Gothic UI", system-ui, sans-serif;
      background: #090317;
      color: #fff1ff;
    }

    * { box-sizing: border-box; }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 25% 10%, rgba(255, 91, 184, .28), transparent 30%),
        radial-gradient(circle at 76% 24%, rgba(94, 234, 255, .18), transparent 28%),
        linear-gradient(#080315, #140724 48%, #2b0d36);
    }

    main {
      width: min(520px, 100%);
      padding: 22px;
      border: 2px solid rgba(255, 147, 212, .9);
      border-radius: 12px;
      background: rgba(18, 7, 34, .82);
      box-shadow: 0 0 40px rgba(255, 77, 178, .32), 0 20px 80px rgba(0,0,0,.36);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      color: #ff7fca;
      font-size: clamp(32px, 7vw, 58px);
      line-height: .9;
      text-shadow: 0 0 16px #ff49af, 3px 3px 0 #32114d;
    }

    p {
      margin: 0 0 16px;
      color: rgba(255, 236, 255, .84);
      line-height: 1.6;
    }

    a {
      min-height: 46px;
      display: inline-grid;
      place-items: center;
      padding: 0 18px;
      border: 1px solid rgba(255, 236, 255, .72);
      border-radius: 9px;
      color: #fff8d9;
      background: linear-gradient(135deg, #ff5daf, #a35cff);
      box-shadow: 0 0 22px rgba(255, 93, 175, .36);
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <main>
    <h1>Puppy<br>Dash</h1>
    <p>実モデル版はローカルHTTPで開く必要があります。自動で切り替わらない場合は下のボタンから開いてください。</p>
    <a id="openGame" href="http://127.0.0.1:8765/outputs/3d-runner-rich.html">Open Game</a>
  </main>
  <script>
    const target = "http://127.0.0.1:8765/outputs/3d-runner-rich.html";
    if (location.href !== target) {
      setTimeout(() => {
        location.href = target;
      }, 350);
    }
  </script>
</body>
</html>
